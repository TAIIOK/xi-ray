<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Xiaomi VLESS</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-brand">
      <div class="login-logo">XV</div>
      <h1>Xiaomi VLESS Panel</h1>
      <p class="login-tagline">Управление VPN для гостевой Wi‑Fi</p>
    </div>

    <div class="login-wrap card">
      <h2>Вход</h2>
      <p class="label">Панель на роутере BE7000</p>
      <div id="err" class="msg error" hidden>Неверный логин или пароль</div>
      <form method="post" action="/login" class="login-form">
        <div class="field">
          <label class="label" for="username">Логин</label>
          <input id="username" name="username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="field">
          <label class="label" for="password">Пароль</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="login-submit">Войти</button>
      </form>
      <p class="login-hint label">По умолчанию: admin / admin — смените после первого входа</p>
    </div>
  </div>
  <script>
    if (location.search.includes('error=1')) document.getElementById('err').hidden = false;
  </script>
</body>
</html>
