#cloud-config
# Base image packages for the Xiaomi VLESS router lab VM.
package_update: true
packages:
  - iptables
  - iproute2
  - curl
  - unzip
  - ca-certificates
  - iputils-ping
  - dnsutils
  - iperf3
  - jq

write_files:
  - path: /etc/sysctl.d/99-xiaomi-vless-lab.conf
    content: |
      net.ipv4.ip_forward=1
      net.ipv4.conf.all.rp_filter=0
      net.ipv4.conf.default.rp_filter=0

runcmd:
  - sysctl --system
  - mkdir -p /mnt/usb-lab/xiaomi-vless /mnt/usb-lab/xray/bin
